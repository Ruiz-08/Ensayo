{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Torneo</title>
    <!-- Carga del CSS corregida asegurando que el archivo existe y es tipo estilo -->
    <link rel="stylesheet" type="text/css" href="{% static 'aplicacion/css/estilos.css' %}">
</head>
<body>
    <header>
        <h1>Gestión de Torneo</h1>
        <nav>
            <ul>
                <!-- Los enlaces pueden ser actualizados luego a tags {% url %} -->
                <li><a href="#">Equipos</a></li>
                <li><a href="#">Partidos</a></li>
                <li><a href="#">Tabla</a></li>
                <li><a href="#">Finalista</a></li>
            </ul>
        </nav>
        <div class="informacion-usuario">
            Usuario: {{ user.username }}
            <a href="#">Cerrar sesión</a>
        </div>
    </header>

    <main>
        {% block contenido %}
        {% endblock %}
    </main>
</body>
</html>
