{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Torneo</title>
    <link rel="stylesheet" type="text/css" href="{% static 'aplicacion/css/base.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'aplicacion/css/login.css' %}">
</head>
<body>
    <video autoplay muted loop id="video-fondo" class="video-fondo">
        <source src="{% static 'aplicacion/videos/video_inicio.mp4' %}" type="video/mp4">
    </video>
    <div class="contenedor-inicio">
        <div class="formulario-inicio">
            <h2>Iniciar Sesión</h2>
            {% if error %}
                <p style="color: #ff4d4d; text-align: center; font-weight: bold;">{{ error }}</p>
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="grupo-formulario">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="grupo-formulario">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="boton boton-login">Iniciar sesión</button>
            </form>
        </div>
    </div>
</body>
</html>
